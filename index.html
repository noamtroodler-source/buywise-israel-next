  <!-- JSON-LD: FAQPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "What is BuyWise Israel?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "BuyWise Israel is a market intelligence platform built for international buyers exploring Israeli real estate. We help you compare 30+ markets, calculate purchase taxes and costs, and connect with verified professionals — all in English."
        }
      },
      {
        "@type": "Question",
        "name": "Is BuyWise free for buyers?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes, BuyWise Israel is completely free for property buyers. You can explore markets, use our calculators, read guides, and browse listings at no cost."
        }
      },
      {
        "@type": "Question",
        "name": "Can I buy property in Israel as a foreign resident?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes, foreign residents can buy property in Israel. However, the purchase tax rates are higher for non-residents, and there are specific legal and financial considerations. Our guides and calculators are designed to help international buyers navigate these differences."
        }
      },
      {
        "@type": "Question",
        "name": "What costs are involved in buying property in Israel?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Buying property in Israel involves purchase tax (mas rechisha), lawyer fees, mortgage arrangement fees, and potentially agent commissions. Use our free Purchase Tax Calculator and Cost Estimator to get a full breakdown based on your specific situation."
        }
      }
    ]
  }
  </script>
